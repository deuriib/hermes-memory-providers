name: engram
version: 2.0.0
type: memory_provider
description: Engram persistent memory for Hermes Agent — remembers across sessions, bugs, and compactions. Connects to engram serve (http://127.0.0.1:7437).
author: Gentleman Programming
hooks:
  - system_prompt_block
  - prefetch
  - queue_prefetch  
  - sync_turn
  - on_session_end
  - shutdown
