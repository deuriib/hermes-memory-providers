[tools]
python = "3.14"
uv = "latest"

[tasks.bootstrap]
description = "Bootstrap: install tools, sync deps, install engram plugin"
run = ["mise install", "uv sync", "bin/hm-install memory/engram"]

[tasks.install]
description = "Install specific plugin (e.g. engram or memory/engram)"
run = "bin/hm-install"

[tasks.install-plugin]
description = "Install a specific plugin by name"
run = "bin/hm-install"

[tasks.uninstall]
description = "Uninstall a plugin (e.g. engram or memory/engram)"
run = "bin/hm-uninstall"

[tasks.update]
description = "Update installed plugins (from repo)"
alias = "up"
run = "bin/hm-update"

[tasks.list]
description = "List available and installed plugins"
run = "bin/hm-list"

[tasks.shell]
description = "Enter uv shell environment"
run = "uv shell"
